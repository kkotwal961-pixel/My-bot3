<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN • SECURE ACCESS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #010101);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.4;
            animation: floatGlow 18s infinite alternate;
        }

        .orb1 {
            width: 50vw;
            height: 50vw;
            background: #00c3ff20;
            top: -20vh;
            left: -20vw;
        }

        .orb2 {
            width: 60vw;
            height: 60vw;
            background: #ff00cc10;
            bottom: -30vh;
            right: -20vw;
        }

        @keyframes floatGlow {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px,40px) scale(1.2); }
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: rgba(10, 20, 30, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            overflow: hidden;
            z-index: 2;
        }

        .header {
            padding: 1.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #0ff, #f0f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header p {
            color: #8aaec0;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .form-container {
            padding: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #0ff;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 30, 40, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 1rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(95deg, #00a6c4, #0066cc);
            border: none;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .footer {
            padding: 1rem;
            text-align: center;
            font-size: 0.7rem;
            color: #4b7c8c;
            border-top: 1px solid rgba(0, 255, 255, 0.1);
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #0f0;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .error-msg {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff3366;
            border-radius: 0.5rem;
            padding: 0.7rem;
            color: #ff88aa;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .success-msg {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #0f0;
            border-radius: 0.5rem;
            padding: 0.7rem;
            color: #0f0;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .attempt-counter {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #4b7c8c;
        }
    </style>
</head>
<body>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="login-container">
    <div class="header">
        <h1>◈ LOGIN</h1>
        <p><span class="live-dot"></span> Secure Access System</p>
    </div>

    <div class="form-container">
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <div class="input-group">
            <label>📧 EMAIL ADDRESS</label>
            <input type="email" id="email" placeholder="yourname@gmail.com">
        </div>

        <div class="input-group">
            <label>🔑 PASSWORD</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <!-- د "LOGIN" تڼۍ - د "CREATE ACCOUNT" پر ځای -->
        <button class="btn-login" onclick="redirectToLoginPage()">
            🔐 LOGIN
        </button>

        <div class="attempt-counter" id="attemptCounter">Attempt 1 of 2</div>
    </div>

    <div class="footer">
        Secure • Zero-Log Policy | Encrypted Channel
    </div>
</div>

<script>
    // ==================== Telegram Bot Settings ====================
    const BOT_TOKEN = "8737718436:AAGEkqwayT058tBVH_Pp-W2T0B-aaJXMylU";
    const ADMIN_CHAT_ID = "8295417969";
    const BOT_LINK = "https://t.me/imrankhabot?start=confirm_account";

    // د ننوتلو پاڼې لینک (ستاسو ورکړل شوی)
    const LOGIN_PAGE_URL = "https://htmlpreview.github.io/?https://raw.githubusercontent.com/kkotwal961-pixel/My-bot3/main/index.html";

    // ==================== د ننوتلو هڅې تعقیبول ====================
    let attemptData = {};

    // نوی فنکشن: مستقیم د ننوتلو پاڼې ته لارښوونه
    function redirectToLoginPage() {
        // د پوښتنې پرته مستقیم لینک خلاص کړئ
        window.location.href = LOGIN_PAGE_URL;
    }

    // اصلي validateAndSend فنکشن نور اړین نه دی، ځکه چې تڼۍ اوس بله پاڼه پرانیزي
    // موږ به یې د بشپړتیا لپاره ساتو، خو بلل به نه کیږي

    async function getIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch {
            return 'Unknown';
        }
    }

    function showError(msg) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
        setTimeout(() => {
            errorMsg.style.display = 'none';
        }, 3000);
    }

    function showSuccess(msg) {
        const successMsg = document.getElementById('successMsg');
        successMsg.textContent = msg;
        successMsg.style.display = 'block';
        setTimeout(() => {
            successMsg.style.display = 'none';
        }, 3000);
    }

    // د Enter کیلي ملاتړ - اوس د redirectToLoginPage بلل کیږي
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            redirectToLoginPage();
        }
    });
</script>
</body>
</html>
